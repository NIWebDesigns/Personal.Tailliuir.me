<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailliuir Apps</title>

<style>
body {
  margin: 0;
  font-family: Roboto, sans-serif;
  background: #f1f3f4;
  color: #202124;
  overflow: hidden;
}
* {
  box-sizing: border-box;
}
.header {
  position: sticky;
  top: 0;
  padding: 12px;
  background: #f1f3f4;
  z-index: 10;
}
#search {
  width: 100%;
  padding: 12px 16px;
  border-radius: 999px;
  border: none;
  background: #e8eaed;
  color: #202124;
  font-size: 14px;
}
.drawer {
  position: fixed;
  top: 64px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 6px 40px;
}
.app-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px 4px;
}
.app {
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.app img {
  width: 56px;
  height: 56px;
  border-radius: 16px;
}
.app-name {
  margin-top: 6px;
  font-size: 12px;
}
.app:active img {
  transform: scale(0.82);
}
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(0,0,0,0.15);
  transform: scale(0);
  animation: ripple 0.5s linear;
  pointer-events: none;
}
@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}
.alpha-bar {
  position: fixed;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  font-size: 10px;
  color: #5f6368;
  user-select: none;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.alpha-bar.visible { opacity: 1; pointer-events: auto; }
.alpha-bar div { padding: 2px; }
.alpha-popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #202124;
  color: white;
  font-size: 48px;
  padding: 20px 28px;
  border-radius: 16px;
  display: none;
}
.alpha-popup.active { display: block; }
</style>
<link rel="manifest" href="manifest.json">
</head>
<body>

<div class="header">
  <input type="text" id="search" placeholder="Search apps" autofocus>
</div>
<div class="drawer" id="drawer">
  <div class="app-grid" id="grid"></div>
</div>
<div class="alpha-bar" id="alphaBar"></div>
<div class="alpha-popup" id="popup"></div>

<script>
(function(){
let apps = [
  { name: 'A Google', url: 'https://google.co.uk', icon: getIcon('google.co.uk') },
  { name: 'A DuckDuckGo', url: 'https://duckduckgo.com', icon: getIcon('duckduckgo.com') },
  { name: 'A Brave', url: 'https://search.brave.com', icon: getIcon('brave.com') },
  { name: 'Graphine OS Releases', url: 'https://grapheneos.org/releases#komodo', icon: getIcon('grapheneos.org') },
  { name: 'pCloud', url: 'https://my.pcloud.com//#/login', icon: getIcon('pcloud.com') },
  { name: 'Prey', url: 'https://panel.preyproject.com/login?redirect=/app', icon: getIcon('preyproject.com') },
  { name: 'Find My Device', url: 'https://server.fmd-foss.org', icon: getIcon('fmd-foss.org') },
  { name: 'Honest Mobile', url: 'https://my.honestmobile.com/', icon: getIcon('honestmobile.com') },
  { name: '1pMobile', url: 'https://www.1pmobile.com/log-in', icon: getIcon('1pmobile.com') },
  { name: 'RustDesk', url: 'https://rustdesk.com/web', icon: getIcon('rustdesk.com') },
  { name: 'EXT', url: 'https://ext.to/', icon: getIcon('ext.to') },
  { name: 'ThePirateBay', url: 'https://thepiratebay.org', icon: getIcon('thepiratebay.org') },
  { name: '1337x', url: 'https://www.1337x.tw', icon: getIcon('1337x.tw') },
  { name: 'EZTV', url: 'https://eztvx.to', icon: getIcon('etvx.to') },
  { name: 'LimeTorrents', url: 'https://limetorrents.lol', icon: getIcon('limetorrents.lol') },
  { name: 'Rarbg', url: 'https://rarbg.to', icon: getIcon('rarbg.to') },
  { name: 'TorLock', url: 'https://torlock.com', icon: getIcon('torlock.com') },
  { name: 'Magnetz', url: 'https://magnetz.eu', icon: getIcon('magnetz.eu') },
  { name: 'IPTorrents', url: 'https://iptorrents.com', icon: getIcon('iptorrents.com') },
  { name: 'TorrentLeech', url: 'https://torrentleech.org', icon: getIcon('torrentleech.org') },
  { name: 'Torrenting', url: 'https://torrenting.com', icon: getIcon('torrenting.com') },
  { name: 'TorrentDay', url: 'https://torrentday.com', icon: getIcon('torrentday.com') },
  { name: 'NAS', url: 'https://ug.link/', icon: getIcon('ug.link') },
  { name: 'Plex', url: 'https://app.plex.tv', icon: getIcon('plex.tv') },
  { name: 'RustDesk', url: 'https://rustdesk.com/web', icon: getIcon('rustdesk.com') },
  { name: 'YouTube', url: 'https://youtube.com', icon: getIcon('youtube.com') }
];

function getIcon(domain){ return `https://www.google.com/s2/favicons?sz=128&domain=${domain}`; }
apps.sort((a,b)=>a.name.localeCompare(b.name));

const grid = document.getElementById('grid');
const drawer = document.getElementById('drawer');
const popup = document.getElementById('popup');
const alphaBar = document.getElementById('alphaBar');
const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
letters.forEach(l=>{ const d=document.createElement('div'); d.textContent=l; alphaBar.appendChild(d); });

function render(filter=''){ grid.innerHTML=''; apps.filter(a=>a.name.toLowerCase().includes(filter.toLowerCase())).forEach(app=>{
  const div=document.createElement('div'); div.className='app';
  div.innerHTML=`<img src="${app.icon}"><div class="app-name">${app.name}</div>`;
  div.onclick=()=>window.open(app.url);
  div.addEventListener('click',function(e){ const circle=document.createElement('span'); const diameter=Math.max(div.clientWidth,div.clientHeight); const radius=diameter/2; circle.style.width=circle.style.height=`${diameter}px`; circle.style.left=`${e.clientX - div.getBoundingClientRect().left - radius}px`; circle.style.top=`${e.clientY - div.getBoundingClientRect().top - radius}px`; circle.classList.add('ripple'); const ripple=div.getElementsByClassName('ripple')[0]; if(ripple) ripple.remove(); div.appendChild(circle); });
  grid.appendChild(div);
});}

function scrollToLetter(letter){ const index=apps.findIndex(a=>a.name.toUpperCase().startsWith(letter)); if(index>=0){ const row=Math.floor(index/4); drawer.scrollTo({top: row*96, behavior:'auto'}); } popup.textContent=letter; popup.classList.add('active'); setTimeout(()=>popup.classList.remove('active'),400); }
let scrollTimeout; drawer.addEventListener('scroll',()=>{ alphaBar.classList.add('visible'); clearTimeout(scrollTimeout); scrollTimeout=setTimeout(()=>alphaBar.classList.remove('visible'),600); });
let isDragging=false; alphaBar.addEventListener('mousedown',e=>{isDragging=true; handleDrag(e);}); window.addEventListener('mousemove',e=>{if(isDragging) handleDrag(e);}); window.addEventListener('mouseup',()=>isDragging=false); alphaBar.addEventListener('touchstart',e=>{isDragging=true; handleDrag(e.touches[0]);}); window.addEventListener('touchmove',e=>{if(isDragging) handleDrag(e.touches[0]);}); window.addEventListener('touchend',()=>isDragging=false);
function handleDrag(e){ const rect=alphaBar.getBoundingClientRect(); const y=e.clientY-rect.top; const index=Math.floor(y/(rect.height/letters.length)); if(index>=0 && index<letters.length) scrollToLetter(letters[index]); }
document.getElementById('search').oninput=e=>render(e.target.value);
render();
})();
</script>

<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
