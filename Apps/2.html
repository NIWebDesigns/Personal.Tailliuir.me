<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pixel Launcher 1:1</title>

<style>
:root{--drawer-bg:#bfc5d2}

body{
  margin:0;
  font-family:Roboto,system-ui,sans-serif;
  background:#000;
  overflow:hidden;
}

*{box-sizing:border-box}

/* STATUS BAR */
.status-bar{
  position:fixed;top:0;left:0;right:0;
  height:32px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 14px;
  color:#fff;
  font-size:13px;
  z-index:100;
}

/* HOME */
.home{
  position:fixed;inset:0;
  padding-top:42px;
  background:#000;
}

.home-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:44px 10px;
  padding:20px 10px 120px;
}

.folder{text-align:center}

.folder-icon{
  width:76px;height:76px;
  border-radius:50%;
  background:#d1d5db;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  padding:10px;
  margin:auto;
}

.folder-icon img{width:100%;height:100%;border-radius:50%}

.label{
  margin-top:6px;
  font-size:13px;
  color:#fff;
}

/* DOCK */
.dock{
  position:fixed;
  bottom:18px;
  left:50%;transform:translateX(-50%);
  display:flex;
  gap:26px;
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(25px);
  padding:12px 22px;
  border-radius:34px;
}

.dock img{
  width:58px;height:58px;
  border-radius:50%;
  background:#e5e7eb;
  padding:10px;
}

/* DRAWER */
.drawer-shell{
  position:fixed;inset:0;
  background:var(--drawer-bg);
  transform:translateY(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}

.drawer-shell.open{transform:translateY(0)}

.handle{
  width:36px;height:4px;
  background:#6b7280;
  border-radius:10px;
  margin:8px auto;
}

#search{
  width:92%;
  margin:6px auto 12px;
  padding:14px 16px;
  border-radius:999px;
  border:none;
  background:#d7dbe3;
  font-size:15px;
}

.drawer{
  flex:1;
  overflow-y:auto;
  padding:0 6px 40px;
}

.app-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:32px 6px;
}

.app{text-align:center}

.app img{
  width:66px;height:66px;
  border-radius:50%;
  background:#e5e7eb;
  padding:10px;
}

.app-name{
  font-size:12px;
  margin-top:6px;
  color:#1f2937;
}

/* swipe */
.swipe-area{
  position:fixed;bottom:0;left:0;right:0;
  height:90px;z-index:200;
}

/* popup */
.popup{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;justify-content:center;
}

.popup-inner{
  background:#d1d5db;
  padding:20px;
  border-radius:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.popup img{
  width:64px;height:64px;
  border-radius:50%;
  background:#fff;
  padding:10px;
}

</style>
</head>
<body>

<div class="status-bar">
  <div id="time"></div>
  <div>📶 📡 🔋</div>
</div>

<div class="home">
  <div class="home-grid" id="homeGrid"></div>
</div>

<div class="dock" id="dock"></div>

<div class="drawer-shell" id="drawer">
  <div class="handle"></div>
  <input id="search" placeholder="Search apps">
  <div class="drawer"><div class="app-grid" id="apps"></div></div>
</div>

<div class="swipe-area" id="swipe"></div>
<div class="popup" id="popup"></div>

<script>
function icon(d){return `https://www.google.com/s2/favicons?sz=128&domain=${d}`}

const folders=[
  {name:'Travel',apps:['google.com','maps.google.com','booking.com','airbnb.com']},
  {name:'VPN',apps:['proton.me','nordvpn.com','surfshark.com','expressvpn.com']},
  {name:'Proton',apps:['proton.me','mail.proton.me','drive.proton.me','vpn.proton.me']},
  {name:'Work',apps:['notion.so','slack.com','drive.google.com','docs.google.com']},
  {name:'Plex',apps:['plex.tv','youtube.com','netflix.com','primevideo.com']},
  {name:'Safety',apps:['bitwarden.com','haveibeenpwned.com','virustotal.com','duckduckgo.com']},
  {name:'Social',apps:['whatsapp.com','reddit.com','twitter.com','instagram.com']},
  {name:'CLOUD',apps:['drive.google.com','dropbox.com','mega.nz','onedrive.live.com']},
];

const homeGrid=document.getElementById('homeGrid');
const dock=document.getElementById('dock');
const drawer=document.getElementById('drawer');
const popup=document.getElementById('popup');
const appsGrid=document.getElementById('apps');

function renderHome(){
  folders.forEach(f=>{
    const el=document.createElement('div');
    el.className='folder';
    el.innerHTML=`
      <div class="folder-icon">
        ${f.apps.slice(0,4).map(a=>`<img src="${icon(a)}">`).join('')}
      </div>
      <div class="label">${f.name}</div>`;
    el.onclick=()=>openFolder(f);
    homeGrid.appendChild(el);
  });
}

function openFolder(folder){
  popup.innerHTML=`<div class="popup-inner">${
folder.apps.map(a=>`<img src="${icon(a)}" onclick="window.open('https://${a}')">`).join('')
}</div>`;
  popup.style.display='flex';
}
popup.onclick=()=>popup.style.display='none';

function renderDock(){
  ['phone','messages','contacts','camera'].forEach(()=>{
    const img=document.createElement('img');
    img.src=icon('google.com');
    dock.appendChild(img);
  });
}

function renderDrawer(){
  const all=[...new Set(folders.flatMap(f=>f.apps))];
  all.forEach(a=>{
    const el=document.createElement('div');
    el.className='app';
    el.innerHTML=`<img src="${icon(a)}"><div class="app-name">${a.split('.')[0]}</div>`;
    el.onclick=()=>window.open('https://'+a);
    appsGrid.appendChild(el);
  });
}

renderHome();
renderDock();
renderDrawer();

let startY=0;
const swipe=document.getElementById('swipe');

swipe.addEventListener('touchstart',e=>startY=e.touches[0].clientY);
swipe.addEventListener('touchend',e=>{
  const endY=e.changedTouches[0].clientY;
  if(startY-endY>50) drawer.classList.add('open');
});

drawer.addEventListener('touchstart',e=>startY=e.touches[0].clientY);
drawer.addEventListener('touchend',e=>{
  const endY=e.changedTouches[0].clientY;
  if(endY-startY>50) drawer.classList.remove('open');
});

function updateTime(){
  const n=new Date();
  document.getElementById('time').textContent=n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
