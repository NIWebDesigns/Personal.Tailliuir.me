<script>
/* PWA manifest injected as Blob URL — required by Brave/Chrome for "Install app" */
(function () {
  function makePNG(size) {
    var c = document.createElement('canvas');
    c.width = c.height = size;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#fff';
    var pad = size*0.18, cell = (size-pad*2)/3, r = cell*0.28;
    for (var row=0;row<3;row++) for (var col=0;col<3;col++) {
      ctx.beginPath();
      ctx.arc(pad+col*cell+cell/2, pad+row*cell+cell/2, r, 0, Math.PI*2);
      ctx.fill();
    }
    return c.toDataURL('image/png');
  }
  var i192=makePNG(192), i512=makePNG(512);
  var m={ name:'Pixel Launcher', short_name:'Launcher', start_url:'./', scope:'./',
    display:'standalone', orientation:'portrait-primary',
    background_color:'#000000', theme_color:'#000000',
    icons:[
      {src:i192,sizes:'192x192',type:'image/png',purpose:'any'},
      {src:i192,sizes:'192x192',type:'image/png',purpose:'maskable'},
      {src:i512,sizes:'512x512',type:'image/png',purpose:'any'},
      {src:i512,sizes:'512x512',type:'image/png',purpose:'maskable'}
    ]};
  var blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
  var link=document.createElement('link');
  link.rel='manifest'; link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
}());

/* Service Worker via Blob — unlocks "Install app" in Brave */
if ('serviceWorker' in navigator) {
  var sw=`self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});`;
  navigator.serviceWorker.register(
    URL.createObjectURL(new Blob([sw],{type:'application/javascript'})),
    {scope:'./'}
  ).catch(()=>{});
}
</script>

<style>
/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after {
  margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
}
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  font-family:'Google Sans','Roboto',sans-serif;
  user-select:none;
  -webkit-user-select:none;
}

/* ═══════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════ */
#homescreen {
  position:fixed; inset:0;
  background:#000;
  z-index:1;
  overflow:hidden;
}

/* Icon/folder grid — anchored to bottom above dock */
.home-grid {
  position:absolute;
  left:0; right:0;
  bottom:168px; /* dock(88px) + pill(28px) + gap(52px) */
  padding:0 8px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  row-gap:28px;
}

/* ═══════════════════════════════════════
   DOCK — 4 icons on pure black, no background
═══════════════════════════════════════ */
#dock {
  position:fixed;
  bottom:28px; left:0; right:0;
  height:88px;
  display:flex; align-items:center; justify-content:space-around;
  padding:0 10px;
  z-index:10;
}

/* ═══════════════════════════════════════
   NAV PILL — sole white bar at very bottom
   Tap = open drawer
═══════════════════════════════════════ */
#nav-pill {
  position:fixed;
  bottom:0; left:0; right:0;
  height:28px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; z-index:10;
}
#nav-pill .bar {
  width:130px; height:5px;
  background:rgba(255,255,255,0.55);
  border-radius:3px;
  transition:background 0.12s;
}
#nav-pill:active .bar { background:rgba(255,255,255,0.9); }

/* ═══════════════════════════════════════
   APP DRAWER — bottom sheet, rounded top corners
═══════════════════════════════════════ */
#appdrawer {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  background:rgb(178,182,210);
  border-radius:28px 28px 0 0;
  z-index:100;
  display:flex; flex-direction:column;
  overflow:hidden;
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 -4px 24px rgba(0,0,0,0.4);
}
#appdrawer.open { transform:translateY(0); }

/* Pill at top of drawer — tap to close */
#drawer-pill {
  flex-shrink:0;
  height:28px; margin-top:8px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
#drawer-pill .bar {
  width:44px; height:5px;
  background:rgba(80,85,130,0.45);
  border-radius:3px;
  transition:background 0.12s;
}
#drawer-pill:active .bar { background:rgba(80,85,130,0.8); }

/* Gap between pill and search bar — matches screenshot */
.drawer-gap { height:46px; flex-shrink:0; }

/* Search bar */
#search-wrap {
  flex-shrink:0;
  margin:0 16px;
  background:rgba(210,214,235,0.9);
  border-radius:32px;
  display:flex; align-items:center;
  padding:11px 18px; gap:12px;
  box-shadow:0 1px 6px rgba(0,0,0,0.1);
}
#search-wrap svg { width:18px; height:18px; fill:#777; flex-shrink:0; display:block; }
#search-input {
  flex:1; border:none; background:transparent;
  font-size:15px; color:#333;
  font-family:inherit; outline:none;
}
#search-input::placeholder { color:#888; }

/* Scrollable app grid */
.drawer-grid {
  flex:1; overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  align-content:start;
  padding:10px 8px 60px;
  row-gap:20px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.drawer-grid::-webkit-scrollbar { display:none; }

#no-results {
  grid-column:1/-1;
  text-align:center; color:#555;
  font-size:14px; padding-top:30px;
  display:none;
}

/* ═══════════════════════════════════════
   SHARED ICON STYLES
═══════════════════════════════════════ */
.app-icon {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  text-decoration:none; cursor:pointer; padding:0 2px;
}
.app-icon:active .icon-img { transform:scale(0.84); }

.icon-img {
  width:58px; height:58px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  transition:transform 0.1s ease;
  flex-shrink:0;
  background:#ccc;
}
/* All images inside icon circles are clipped to circle automatically */
.icon-img img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  border-radius:50%;
}

.app-label {
  font-size:11px; color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,0.95);
  text-align:center;
  max-width:72px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  line-height:1.3;
}
.dark-label {
  color:#18192c !important;
  text-shadow:none !important;
}

/* ═══════════════════════════════════════
   FOLDER ICONS — circular bubbles
═══════════════════════════════════════ */
.folder-icon {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  cursor:pointer;
}
.folder-bubble {
  width:58px; height:58px;
  border-radius:50%;
  background:rgba(148,156,204,0.44);
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:2px; padding:8px;
  transition:transform 0.1s ease;
  overflow:hidden;
}
.folder-icon:active .folder-bubble { transform:scale(0.84); }
.folder-mini {
  border-radius:4px; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  width:100%; height:100%;
  background:#bbb;
}
.folder-mini img {
  width:100%; height:100%;
  object-fit:cover; display:block;
}
.folder-label {
  font-size:12px; font-weight:500; color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,0.95);
  text-align:center;
  max-width:72px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

/* ═══════════════════════════════════════
   FOLDER POPUP — white card, left-positioned
═══════════════════════════════════════ */
#folder-overlay {
  position:fixed; inset:0;
  z-index:400;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  opacity:0; pointer-events:none;
  transition:opacity 0.18s ease;
}
#folder-overlay.open { opacity:1; pointer-events:all; }

.folder-popup {
  position:absolute;
  left:16px; top:50%;
  transform:translateY(-60%) scale(0.85);
  transition:transform 0.2s ease;
  background:rgba(235,237,248,0.97);
  border-radius:24px;
  padding:22px 20px 16px;
  width:230px;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
}
#folder-overlay.open .folder-popup { transform:translateY(-60%) scale(1); }

.folder-popup-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px 14px;
  width:100%; justify-items:center;
}
.folder-popup-name {
  font-size:14px; font-weight:500; color:#1a1b2e;
}
</style>

  </div>

<div id="folder-overlay" onclick="closeFolder(event)">

</div>

/* ─────────────────────────────────────────────────
   HOME SCREEN LAYOUT — 4 column grid
   { type:'folder', name:'FolderName' }
   { type:'empty' }  ← leaves a blank cell
───────────────────────────────────────────────── */
const HOME_ITEMS = [
  { type:'folder', name:'Travel'     },
  { type:'folder', name:'VPN'        },
  { type:'folder', name:'Proton'     },
  { type:'empty'                     },
  { type:'folder', name:'Work'       },
  { type:'empty'                     },
  { type:'folder', name:'Plex'       },
  { type:'folder', name:'Safety'     },
  { type:'folder', name:'Social'     },
  { type:'empty'                     },
  { type:'folder', name:'CLOUD'      },
  { type:'folder', name:'App Drawer' },
];


/* ═══════════════════════════════════════════════════
   ENGINE — no need to edit below this line
═══════════════════════════════════════════════════ */

/**
 * Build a circular icon element.
 * icon = string URL  → image clipped to circle (webp/png/jpg/svg all work)
 * icon = { color, text } → solid colour circle with text initials
 */
function buildIcon(icon, size) {
  const el = document.createElement('div');
  el.className = 'icon-img';
  el.style.width = size;
  el.style.height = size;

  if (typeof icon === 'string' && icon) {
    el.style.background = '#ddd';
    const img = document.createElement('img');
    img.src = icon;
    img.onerror = function() {
      el.style.background = '#888';
      this.remove();
    };
    el.appendChild(img);
  } else if (icon && icon.color) {
    el.style.background = icon.color;
    el.style.display = 'flex';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
    el.style.fontSize = (icon.text && icon.text.length > 3) ? '9px' : (icon.text && icon.text.length > 2) ? '10px' : '13px';
    el.style.fontWeight = '700';
    el.style.color = '#fff';
    el.style.letterSpacing = '-0.3px';
    el.textContent = icon.text || '?';
  } else {
    el.style.background = '#888';
  }
  return el;
}

/** Build an app icon link element */
function buildAppIcon(app, size, darkLabel) {
  const a = document.createElement('a');
  a.className = 'app-icon';
  a.href = app.url || '#';
  const u = app.url || '';
  if (u && u !== '#' && !u.startsWith('tel') && !u.startsWith('sms') && !u.startsWith('contacts')) {
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
  }
  a.appendChild(buildIcon(app.icon, size || '58px'));
  const lbl = document.createElement('span');
  lbl.className = 'app-label' + (darkLabel ? ' dark-label' : '');
  lbl.textContent = app.name;
  a.appendChild(lbl);
  return a;
}

/** Build folder 2×2 preview mini icons */
function buildFolderMini(apps) {
  const b = document.createElement('div');
  b.className = 'folder-bubble';
  apps.slice(0, 4).forEach(function(app) {
    const m = document.createElement('div');
    m.className = 'folder-mini';
    if (typeof app.icon === 'string' && app.icon) {
      m.style.background = '#bbb';
      const img = document.createElement('img');
      img.src = app.icon;
      img.onerror = function() { m.style.background = '#888'; this.remove(); };
      m.appendChild(img);
    } else if (app.icon && app.icon.color) {
      m.style.background = app.icon.color;
      m.style.display = 'flex';
      m.style.alignItems = 'center';
      m.style.justifyContent = 'center';
      m.style.fontSize = '7px';
      m.style.fontWeight = '700';
      m.style.color = '#fff';
      m.textContent = app.icon.text || '';
    } else {
      m.style.background = '#888';
    }
    b.appendChild(m);
  });
  while (b.children.length < 4) {
    const empty = document.createElement('div');
    empty.className = 'folder-mini';
    b.appendChild(empty);
  }
  return b;
}

/** Render home screen grid */
function renderHome() {
  const grid = document.getElementById('home-grid');
  grid.innerHTML = '';
  HOME_ITEMS.forEach(function(item) {
    if (item.type === 'empty') {
      grid.appendChild(document.createElement('div'));
      return;
    }
    const folder = FOLDERS[item.name] || { apps: [] };
    const wrap = document.createElement('div');
    wrap.className = 'folder-icon';
    wrap.appendChild(buildFolderMini(folder.apps));
    const lbl = document.createElement('span');
    lbl.className = 'folder-label';
    lbl.textContent = item.name;
    wrap.appendChild(lbl);
    wrap.addEventListener('click', function() { openFolder(item.name); });
    grid.appendChild(wrap);
  });
}

/** Render dock */
function renderDock() {
  const dock = document.getElementById('dock');
  dock.innerHTML = '';
  DOCK_APPS.forEach(function(app) {
    dock.appendChild(buildAppIcon(app, '58px', false));
  });
}

/** Sort apps A→Z once */
const sortedApps = [...APPS].sort(function(a, b) {
  return a.name.localeCompare(b.name);
});

/** Render app drawer, optionally filtered */
function renderDrawer(q) {
  const grid = document.getElementById('drawer-grid');
  const noRes = document.getElementById('no-results');
  Array.from(grid.querySelectorAll('.app-icon')).forEach(function(el) { el.remove(); });
  const query = (q || '').trim().toLowerCase();
  const list = query ? sortedApps.filter(function(a) { return a.name.toLowerCase().includes(query); }) : sortedApps;
  if (!list.length) { noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  list.forEach(function(app) {
    grid.insertBefore(buildAppIcon(app, '58px', true), noRes);
  });
}

/** Open folder popup */
function openFolder(name) {
  const folder = FOLDERS[name];
  if (!folder) return;
  const grid = document.getElementById('folder-popup-grid');
  grid.innerHTML = '';
  document.getElementById('folder-popup-name').textContent = name;
  folder.apps.forEach(function(app) {
    const icon = buildAppIcon(app, '56px', true);
    grid.appendChild(icon);
  });
  document.getElementById('folder-overlay').classList.add('open');
}
function closeFolder(e) {
  document.getElementById('folder-overlay').classList.remove('open');
}

/** Drawer open/close */
function openDrawer() {
  document.getElementById('appdrawer').classList.add('open');
  document.getElementById('search-input').value = '';
  renderDrawer('');
}
function closeDrawer() {
  document.getElementById('appdrawer').classList.remove('open');
  document.getElementById('search-input').blur();
}

/** Live search */
document.getElementById('search-input').addEventListener('input', function() {
  renderDrawer(this.value);
});

/** ESC key */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeFolder(); closeDrawer(); }
});

/** Init */
renderHome();
renderDock();
renderDrawer('');
</script>
