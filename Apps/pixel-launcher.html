<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Launcher">
<meta name="theme-color" content="#000000">
<script>
// Inject PWA manifest via Blob URL — this is what Brave/Chrome on Android
// requires to show "Install app" instead of just "Add to Home Screen shortcut".
// Icons are generated as real PNGs via canvas (SVG icons are rejected by Chrome PWA checker).
(function () {
  function makePNG(size) {
    var c = document.createElement('canvas');
    c.width = c.height = size;
    var ctx = c.getContext('2d');
    // Black background
    ctx.fillStyle = '#000000';
    ctx.roundRect
      ? (ctx.beginPath(), ctx.roundRect(0, 0, size, size, size * 0.2), ctx.fill())
      : ctx.fillRect(0, 0, size, size);
    // 3x3 white grid of circles — launcher icon look
    ctx.fillStyle = '#ffffff';
    var pad = size * 0.18;
    var cell = (size - pad * 2) / 3;
    var r = cell * 0.28;
    for (var row = 0; row < 3; row++) {
      for (var col = 0; col < 3; col++) {
        var cx = pad + col * cell + cell / 2;
        var cy = pad + row * cell + cell / 2;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    return c.toDataURL('image/png');
  }

  var icon192 = makePNG(192);
  var icon512 = makePNG(512);

  var manifest = {
    name: 'Pixel Launcher',
    short_name: 'Launcher',
    description: 'My personal app launcher',
    start_url: './',
    scope: './',
    display: 'standalone',
    orientation: 'portrait-primary',
    background_color: '#000000',
    theme_color: '#000000',
    icons: [
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any' },
      { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'maskable' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any' },
      { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'maskable' }
    ]
  };

  var blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  var blobUrl = URL.createObjectURL(blob);
  var link = document.createElement('link');
  link.rel = 'manifest';
  link.href = blobUrl;
  document.head.appendChild(link);
}());
</script>
<title>Pixel Launcher</title>
<style>
/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Google Sans', 'Roboto', sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

/* ═══════════════════════════════════════
   STATUS BAR
═══════════════════════════════════════ */
#statusbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  z-index: 9999;
  pointer-events: none;
}
.sb-time {
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2px;
}
.sb-right {
  display: flex;
  align-items: center;
  gap: 5px;
}
.sb-right svg { width: 14px; height: 14px; fill: #fff; display: block; }
.sb-batt { color: #fff; font-size: 11px; font-weight: 600; }

/* ═══════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════ */
#homescreen {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 1;
  overflow: hidden;
}

/* Folder/icon grid — bottom aligned */
.home-grid {
  position: absolute;
  left: 0; right: 0;
  /* bottom = dock(88px) + pill(28px) + larger gap to match screenshot */
  bottom: 168px;
  padding: 0 8px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  row-gap: 28px;
}

/* ═══════════════════════════════════════
   DOCK — 4 icons on pure black, no bg
═══════════════════════════════════════ */
#dock {
  position: fixed;
  bottom: 28px;
  left: 0; right: 0;
  height: 88px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 10px;
  z-index: 10;
  /* Absolutely no background */
}

/* ═══════════════════════════════════════
   NAV PILL — single white bar at very bottom
   This IS the drawer opener
═══════════════════════════════════════ */
#nav-pill {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 10;
}
#nav-pill .bar {
  width: 130px;
  height: 5px;
  background: rgba(255,255,255,0.55);
  border-radius: 3px;
  transition: background 0.12s;
}
#nav-pill:active .bar { background: rgba(255,255,255,0.9); }

/* ═══════════════════════════════════════
   APP DRAWER — slides up as bottom sheet
   with ROUNDED TOP CORNERS like the photos
═══════════════════════════════════════ */
#appdrawer {
  position: fixed;
  /* starts just below the status bar (32px) so corners show */
  top: 32px;
  left: 0; right: 0; bottom: 0;
  background: rgb(178, 182, 210);
  border-radius: 28px 28px 0 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  /* Off screen below */
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  /* Shadow to lift off home screen */
  box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
}
#appdrawer.open {
  transform: translateY(0);
}

/* Pill at top of drawer to close it */
#drawer-pill {
  flex-shrink: 0;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-top: 8px;
}
#drawer-pill .bar {
  width: 44px;
  height: 5px;
  background: rgba(80, 85, 130, 0.45);
  border-radius: 3px;
  transition: background 0.12s;
}
#drawer-pill:active .bar { background: rgba(80, 85, 130, 0.8); }

/* Gap between pill and search — bigger to match screenshot */
.drawer-gap { height: 46px; flex-shrink: 0; }

/* Search bar */
#search-wrap {
  flex-shrink: 0;
  margin: 0 16px;
  background: rgba(210, 214, 235, 0.9);
  border-radius: 32px;
  display: flex;
  align-items: center;
  padding: 11px 18px;
  gap: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.1);
}
#search-wrap svg { width: 18px; height: 18px; fill: #777; flex-shrink: 0; display: block; }
#search-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 15px;
  color: #333;
  font-family: inherit;
  outline: none;
}
#search-input::placeholder { color: #888; }

/* App scroll grid */
.drawer-grid {
  flex: 1;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  align-content: start;
  padding: 10px 8px 60px;
  row-gap: 20px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.drawer-grid::-webkit-scrollbar { display: none; }

#no-results {
  grid-column: 1 / -1;
  text-align: center;
  color: #555;
  font-size: 14px;
  padding-top: 30px;
  display: none;
}

/* ═══════════════════════════════════════
   SHARED ICON STYLES
═══════════════════════════════════════ */
.app-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  cursor: pointer;
  padding: 0 2px;
  -webkit-tap-highlight-color: transparent;
}
.app-icon:active .icon-img { transform: scale(0.84); }

.icon-img {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: transform 0.1s ease;
  flex-shrink: 0;
}

.app-label {
  font-size: 11px;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.95);
  text-align: center;
  max-width: 72px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.drawer-grid .app-label {
  color: #18192c;
  text-shadow: none;
}

/* ═══════════════════════════════════════
   FOLDER ICONS — circular, semi-transparent
═══════════════════════════════════════ */
.folder-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
}
.folder-bubble {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: rgba(148, 156, 204, 0.44);
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 2px;
  padding: 8px;
  transition: transform 0.1s ease;
  overflow: hidden;
}
.folder-icon:active .folder-bubble { transform: scale(0.84); }
.folder-mini {
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%; height: 100%;
}
.folder-label {
  font-size: 12px;
  font-weight: 500;
  color: #fff;
  text-shadow: 0 1px 4px rgba(0,0,0,0.95);
  text-align: center;
  max-width: 72px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══════════════════════════════════════
   FOLDER POPUP — white card, left-positioned
   exactly like the Travel screenshot
═══════════════════════════════════════ */
#folder-overlay {
  position: fixed;
  inset: 0;
  z-index: 400;
  /* No solid overlay — blurred background behind card */
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease;
}
#folder-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.folder-popup {
  position: absolute;
  /* Positioned left-of-centre like the screenshot */
  left: 16px;
  top: 50%;
  transform: translateY(-60%) scale(0.85);
  transition: transform 0.2s ease;
  background: rgba(235, 237, 248, 0.97);
  border-radius: 24px;
  padding: 22px 20px 16px;
  width: 230px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
}
#folder-overlay.open .folder-popup {
  transform: translateY(-60%) scale(1);
}

.folder-popup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px 14px;
  width: 100%;
  justify-items: center;
}
.folder-popup-name {
  font-size: 14px;
  font-weight: 500;
  color: #1a1b2e;
  margin-top: 2px;
}
.folder-popup .app-label {
  color: #1a1b2e;
  text-shadow: none;
}
.folder-popup .icon-img {
  width: 56px;
  height: 56px;
}
</style>
</head>

/* ═══════════════════════════
   HOME SCREEN LAYOUT (4 cols)
═══════════════════════════ */
const HOME_ITEMS = [
  { type:'folder', name:'Travel'     },
  { type:'folder', name:'VPN'        },
  { type:'folder', name:'Proton'     },
  { type:'empty'                     },
  { type:'folder', name:'Work'       },
  { type:'empty'                     },
  { type:'folder', name:'Plex'       },
  { type:'folder', name:'Safety'     },
  { type:'folder', name:'Social'     },
  { type:'empty'                     },
  { type:'folder', name:'CLOUD'      },
  { type:'folder', name:'App Drawer' },
];


/* ═══════════════════════════════════════════════════
   ENGINE
═══════════════════════════════════════════════════ */

function buildIcon(def, size) {
  const el = document.createElement('div');
  el.className = 'icon-img';
  el.style.width = size; el.style.height = size;
  el.style.background = def.bg || '#fff';
  if (def.type === 'img') {
    const img = document.createElement('img');
    img.src = def.src;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    el.appendChild(img);
  } else if (def.type === 'svg') {
    el.innerHTML = def.svg;
    const s = el.querySelector('svg');
    if (s) { s.style.cssText = 'width:60%;height:60%;display:block;flex-shrink:0;'; }
  } else if (def.type === 'text') {
    Object.assign(el.style, { display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:'12px', fontWeight:'700', color: def.color||'#fff', letterSpacing:'-0.3px' });
    el.textContent = def.text;
  }
  return el;
}

function buildAppIcon(app, sz, darkLabel) {
  const a = document.createElement('a');
  a.className = 'app-icon';
  a.href = app.url || '#';
  const u = app.url || '';
  if (u && u !== '#' && !u.startsWith('tel') && !u.startsWith('sms') && !u.startsWith('contacts'))
    a.target = '_blank', a.rel = 'noopener noreferrer';
  a.appendChild(buildIcon(app.icon, sz || '58px'));
  const lbl = document.createElement('span');
  lbl.className = 'app-label';
  if (darkLabel) { lbl.style.color = '#18192c'; lbl.style.textShadow = 'none'; }
  lbl.textContent = app.name;
  a.appendChild(lbl);
  return a;
}

function buildFolderMini(apps) {
  const b = document.createElement('div');
  b.className = 'folder-bubble';
  apps.slice(0,4).forEach(app => {
    const m = document.createElement('div');
    m.className = 'folder-mini';
    m.style.background = app.icon.bg || '#eee';
    if (app.icon.type === 'svg') {
      m.innerHTML = app.icon.svg;
      const s = m.querySelector('svg');
      if (s) s.style.cssText = 'width:100%;height:100%;display:block;';
    } else if (app.icon.type === 'img') {
      const img = document.createElement('img');
      img.src = app.icon.src;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      m.appendChild(img);
    } else if (app.icon.type === 'text') {
      Object.assign(m.style, { display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:'8px', fontWeight:'700', color: app.icon.color||'#fff' });
      m.textContent = app.icon.text;
    }
    b.appendChild(m);
  });
  while (b.children.length < 4)
    b.appendChild(Object.assign(document.createElement('div'), { className:'folder-mini' }));
  return b;
}

function renderHome() {
  const grid = document.getElementById('home-grid');
  grid.innerHTML = '';
  HOME_ITEMS.forEach(item => {
    if (item.type === 'empty') { grid.appendChild(document.createElement('div')); return; }
    const folder = FOLDERS[item.name] || { apps:[] };
    const wrap = document.createElement('div');
    wrap.className = 'folder-icon';
    wrap.appendChild(buildFolderMini(folder.apps));
    const lbl = document.createElement('span');
    lbl.className = 'folder-label';
    lbl.textContent = item.name;
    wrap.appendChild(lbl);
    wrap.addEventListener('click', () => openFolder(item.name));
    grid.appendChild(wrap);
  });
}

function renderDock() {
  const dock = document.getElementById('dock');
  dock.innerHTML = '';
  DOCK_APPS.forEach(app => dock.appendChild(buildAppIcon(app, '58px', false)));
}

const sortedApps = [...APPS].sort((a,b) => a.name.localeCompare(b.name));

function renderDrawer(q) {
  const grid = document.getElementById('drawer-grid');
  const noRes = document.getElementById('no-results');
  Array.from(grid.querySelectorAll('.app-icon')).forEach(el => el.remove());
  const query = (q||'').trim().toLowerCase();
  const list = query ? sortedApps.filter(a => a.name.toLowerCase().includes(query)) : sortedApps;
  if (!list.length) { noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  list.forEach(app => grid.insertBefore(buildAppIcon(app, '58px', true), noRes));
}

function openFolder(name) {
  const folder = FOLDERS[name];
  if (!folder) return;
  const grid = document.getElementById('folder-popup-grid');
  grid.innerHTML = '';
  document.getElementById('folder-popup-name').textContent = name;
  folder.apps.forEach(app => {
    const ic = buildAppIcon(app, '56px', true);
    grid.appendChild(ic);
  });
  document.getElementById('folder-overlay').classList.add('open');
}
function closeFolder(e) {
  document.getElementById('folder-overlay').classList.remove('open');
}

function openDrawer() {
  document.getElementById('appdrawer').classList.add('open');
  document.getElementById('search-input').value = '';
  renderDrawer('');
}
function closeDrawer() {
  document.getElementById('appdrawer').classList.remove('open');
  document.getElementById('search-input').blur();
}

document.getElementById('search-input').addEventListener('input', function() {
  renderDrawer(this.value);
});

// Clock
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick, 15000);

// ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeFolder(); closeDrawer(); }
});

// PWA: Register a service worker via Blob URL (required by Brave/Chrome for
// "Install app" — without a SW it only offers "Add shortcut").
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'launcher-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', './index.html'])));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => {});
}

// Init
renderHome();
renderDock();
renderDrawer('');
</script>
