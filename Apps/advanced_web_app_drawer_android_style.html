<style>
body {
  margin: 0;
  font-family: Roboto, sans-serif;
  background: #f1f3f4;
  color: #202124;
  overflow: hidden;
}
* { box-sizing: border-box; }

.header {
  position: sticky;
  top: 0;
  padding: 12px;
  background: #f1f3f4;
  z-index: 10;
}

#search {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  display: block;
  padding: 12px 16px;
  border-radius: 999px;
  border: none;
  background: #e8eaed;
  font-size: 14px;
}

.drawer {
  position: fixed;
  top: 64px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  padding: 8px 12px 24px;
  mask-image: linear-gradient(to bottom, transparent 0px, black 24px, black calc(100% - 24px), transparent);
}

.app-grid {
  display: grid;
  grid-template-columns: repeat(4, 72px);
  justify-content: center;
  gap: 20px 16px;
  margin: 0 auto;
  max-width: 1000px;
}

@media (min-width: 600px) {
  .app-grid { grid-template-columns: repeat(6, 76px); }
}

@media (min-width: 900px) {
  .app-grid { grid-template-columns: repeat(8, 84px); }
}

@media (min-width: 1200px) {
  .app-grid { grid-template-columns: repeat(10, 92px); }
}

.app {
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: transform 0.15s;
}

.app:hover {
  transform: scale(1.08);
}

.app img {
  width: 56px;
  height: 56px;
  border-radius: 16px;
}

.app-name {
  margin-top: 6px;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.app:active img {
  transform: scale(0.82);
}

.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(0,0,0,0.15);
  transform: scale(0);
  animation: ripple 0.5s linear;
}

@keyframes ripple {
  to { transform: scale(4); opacity: 0; }
}

.card {
  margin: 32px auto;
  max-width: 900px;
  padding: 16px;
  background: white;
  border-radius: 24px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* App open animation overlay */
.app-open {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f1f3f4;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 999;
}

.app-open.active {
  opacity: 1;
}

</style>

  const grid = document.getElementById('grid');
  const overlay = document.getElementById('appOpen');

  function render(filter=''){
    grid.innerHTML='';

    apps
      .filter(a=>a.name.toLowerCase().includes(filter.toLowerCase()))
      .forEach(app=>{
        const div = document.createElement('div');
        div.className='app';

        div.innerHTML=`
          <img src="${app.icon}">
          <div class="app-name">${app.name}</div>
        `;

        div.onclick = ()=>{
          overlay.classList.add('active');
          setTimeout(()=> window.open(app.url, '_blank'), 150);
          setTimeout(()=> overlay.classList.remove('active'), 300);
        };

        div.addEventListener('click', e => {
          const circle = document.createElement('span');
          const diameter = Math.max(div.clientWidth, div.clientHeight);
          const radius = diameter / 2;

          circle.style.width = circle.style.height = `${diameter}px`;
          circle.style.left = `${e.clientX - div.getBoundingClientRect().left - radius}px`;

          div.appendChild(circle);
        });
