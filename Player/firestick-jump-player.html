<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Firestick Jump Player</title>
  <style>
    :root{--bg:#000;--panel:rgba(12,12,12,.88);--panel-2:rgba(26,26,26,.96);--text:#fff;--muted:#c6c6c6;--line:rgba(255,255,255,.16);--accent:#69d2de}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#000;color:var(--text);font-family:Arial,sans-serif}
    body{overflow:hidden}
    video{width:100vw;height:100vh;object-fit:contain;background:#000}
    button,input{font:inherit;color:inherit}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:20px;z-index:30}
    .dialog{width:min(920px,100%);background:var(--panel-2);border:1px solid var(--line);border-radius:18px;padding:24px;display:grid;gap:16px}
    h1{font-size:32px;line-height:1.1}
    p{font-size:18px;color:var(--muted)}
    input{width:100%;height:58px;padding:0 16px;background:#111;border:1px solid var(--line);border-radius:12px;font-size:18px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .btn{min-width:110px;height:56px;padding:0 18px;border-radius:12px;border:1px solid var(--line);background:#1d1d1d;cursor:pointer;font-size:20px;font-weight:700}
    .btn-primary{background:var(--accent);color:#001316;border:none}
    .bottom-bar{position:fixed;left:16px;right:16px;bottom:16px;padding:14px 16px;background:var(--panel);border:1px solid var(--line);border-radius:18px;display:flex;align-items:center;gap:12px;z-index:20;backdrop-filter:blur(8px)}
    .jump-box{display:flex;align-items:center;gap:8px;background:#111;padding:6px;border-radius:12px;border:1px solid var(--line);flex:1}
    .jump-box input{width:200px;height:42px;font-size:18px;padding:0 12px}
    .jump-box .btn{height:42px;min-width:86px;font-size:17px}
    .status{font-size:16px;color:var(--muted);min-width:140px}
    .time{font-size:16px;color:var(--muted);min-width:120px;text-align:right}
    :focus-visible{outline:3px solid var(--accent);outline-offset:3px}
    @media (max-width:700px){.bottom-bar{flex-wrap:wrap}.jump-box{width:100%;justify-content:space-between}.jump-box input{flex:1}}
  </style>
</head>
<body>
  <video id="video" playsinline webkit-playsinline preload="metadata"></video>

  <div class="overlay" id="overlay">
    <div class="dialog">
      <h1>Paste a direct video link</h1>
      <p>Best results on Amazon Silk usually come from direct MP4 or WebM links. HLS can work too if the stream is compatible.</p>
      <input id="urlInput" type="text" placeholder="https://example.com/video.mp4">
      <div class="row">
        <button class="btn btn-primary" id="loadBtn" type="button">Load video</button>
        <button class="btn" id="sampleBtn" type="button">Sample MP4</button>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn" id="playBtn" type="button">Play</button>
    <button class="btn" id="stopBtn" type="button">Stop</button>
    <button class="btn" id="changeBtn" type="button">Change link</button>
    <div class="jump-box">
      <input id="jumpInput" type="text" placeholder="0230 = 2h30m">
      <button class="btn" id="jumpBtn" type="button">Jump</button>
    </div>
    <div class="status" id="status">No video loaded</div>
    <div class="time" id="time">00:00 / 00:00</div>
  </div>

  <script>
    const video=document.getElementById("video");
    const overlay=document.getElementById("overlay");
    const urlInput=document.getElementById("urlInput");
    const loadBtn=document.getElementById("loadBtn");
    const sampleBtn=document.getElementById("sampleBtn");
    const playBtn=document.getElementById("playBtn");
    const stopBtn=document.getElementById("stopBtn");
    const changeBtn=document.getElementById("changeBtn");
    const jumpInput=document.getElementById("jumpInput");
    const jumpBtn=document.getElementById("jumpBtn");
    const status=document.getElementById("status");
    const time=document.getElementById("time");

    function fmt(t){if(!isFinite(t)) return "00:00"; const h=Math.floor(t/3600), m=Math.floor((t%3600)/60), s=Math.floor(t%60); return h>0 ? String(h)+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0") : String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
    function updateTime(){time.textContent=fmt(video.currentTime)+" / "+fmt(video.duration);}
    function setStatus(text){status.textContent=text;}
    function clampTime(t){return Math.max(0, Math.min(isFinite(video.duration)?video.duration:t, t));}
    function seekTo(t){if(!video.src) return; if(!isFinite(video.duration)){setStatus("Wait for video to load"); return;} video.currentTime=clampTime(t); updateTime();}
    function parseJump(value){const v=(value||"").trim().replace(/[^0-9:]/g,""); if(!v) return null; 
if(v.includes(":")){const parts=v.split(":").map(Number); if(parts.some(n=>Number.isNaN(n))) return null; if(parts.length===2) return parts[0]*60 + parts[1]; if(parts.length===3) return parts[0]*3600 + parts[1]*60 + parts[2];}
if(v.length===4){const h=parseInt(v.substring(0,2)); const m=parseInt(v.substring(2,4)); return h*3600 + m*60;}
return Number(v);
}

    function loadVideo(url){
      const clean=(url||"").trim();
      if(!clean){setStatus("Paste a direct video link"); return;}
      video.pause();
      video.src=clean;
      video.load();
      overlay.style.display="none";
      setStatus("Loaded");
      playBtn.textContent="Play";
      video.focus();
    }

    function togglePlay(){
      if(!video.src){overlay.style.display="flex";urlInput.focus();return;}
      if(video.paused){
        const p=video.play();
        if(p&&typeof p.then==="function"){
          p.then(()=>{setStatus("Playing");playBtn.textContent="Pause";}).catch(()=>{setStatus("Press Play again");});
        }
      } else {
        video.pause();
        setStatus("Paused");
        playBtn.textContent="Play";
      }
    }

    loadBtn.addEventListener("click",()=>loadVideo(urlInput.value));
    sampleBtn.addEventListener("click",()=>{const s="https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"; urlInput.value=s; loadVideo(s);});
    playBtn.addEventListener("click",togglePlay);
    stopBtn.addEventListener("click",()=>{video.pause(); video.currentTime=0; playBtn.textContent="Play"; setStatus("Stopped"); updateTime();});
    changeBtn.addEventListener("click",()=>{overlay.style.display="flex"; urlInput.focus();});
    jumpBtn.addEventListener("click",()=>{const secs=parseJump(jumpInput.value); if(secs===null){setStatus("Enter 0230 or 1:23:45"); return;} seekTo(secs); setStatus("Jumped to "+fmt(secs));});
    urlInput.addEventListener("keydown",e=>{if(e.key==="Enter") loadVideo(urlInput.value);});
    jumpInput.addEventListener("keydown",e=>{if(e.key==="Enter") jumpBtn.click();});

    video.addEventListener("loadedmetadata",()=>{setStatus("Ready"); updateTime();});
    video.addEventListener("timeupdate",updateTime);
    video.addEventListener("play",()=>{setStatus("Playing"); playBtn.textContent="Pause";});
    video.addEventListener("pause",()=>{if(video.currentTime===0||video.ended) return; setStatus("Paused"); playBtn.textContent="Play";});
    video.addEventListener("waiting",()=>setStatus("Buffering"));
    video.addEventListener("ended",()=>{setStatus("Ended"); playBtn.textContent="Play";});
    video.addEventListener("error",()=>{setStatus("Could not play this link"); playBtn.textContent="Play";});

    document.addEventListener("keydown",e=>{
      if(e.key==="MediaPlayPause" || (e.key==="Enter" && (document.activeElement===video || document.activeElement===playBtn))){ e.preventDefault(); togglePlay(); }
      if(e.key==="ArrowLeft" && document.activeElement===video){ e.preventDefault(); seekTo(video.currentTime - 10); }
      if(e.key==="ArrowRight" && document.activeElement===video){ e.preventDefault(); seekTo(video.currentTime + 10); }
    });
  </script>
</body>
</html>
